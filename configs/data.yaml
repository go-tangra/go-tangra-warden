data:
  database:
    driver: "postgresql"
    source: "postgres://postgres:${DB_PASSWORD:admin123}@${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:warden}?sslmode=disable"
    migrate: true
    max_idle: 10
    max_open: 100
    max_lifetime: 3600s
    debug: false

  redis:
    network: "tcp"
    addr: "localhost:6379"
    password: ""
    db: 0
    dial_timeout: 5s
    read_timeout: 3s
    write_timeout: 3s
