syntax = "proto3";

package warden.service.v1;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

// System Service - health checks and system info
service WardenSystemService {
  // Health check
  rpc Health(google.protobuf.Empty) returns (HealthResponse) {
    option (google.api.http) = {
      get: "/v1/health"
    };
  }

  // Get service info
  rpc GetInfo(google.protobuf.Empty) returns (GetInfoResponse) {
    option (google.api.http) = {
      get: "/v1/info"
    };
  }

  // Check Vault connectivity
  rpc CheckVault(google.protobuf.Empty) returns (CheckVaultResponse) {
    option (google.api.http) = {
      get: "/v1/vault/check"
    };
  }

  // Get statistics for dashboard
  rpc GetStats(GetStatsRequest) returns (GetStatsResponse) {
    option (google.api.http) = {
      get: "/v1/stats"
    };
  }

  // Create a share link for a secret (proxied to sharing module)
  rpc CreateShareSecret(CreateShareSecretRequest) returns (CreateShareSecretResponse) {
    option (google.api.http) = {
      post: "/v1/shares"
      body: "*"
    };
  }
}

// Health status
enum HealthStatus {
  HEALTH_STATUS_UNSPECIFIED = 0;
  HEALTH_STATUS_HEALTHY = 1;
  HEALTH_STATUS_DEGRADED = 2;
  HEALTH_STATUS_UNHEALTHY = 3;
}

message HealthResponse {
  HealthStatus status = 1 [json_name = "status"];
  string message = 2 [json_name = "message"];
  map<string, ComponentHealth> components = 3 [json_name = "components"];
}

message ComponentHealth {
  HealthStatus status = 1 [json_name = "status"];
  string message = 2 [json_name = "message"];
}

message GetInfoResponse {
  string version = 1 [json_name = "version"];
  string build_time = 2 [json_name = "buildTime"];
  string go_version = 3 [json_name = "goVersion"];
  string git_commit = 4 [json_name = "gitCommit"];
}

message CheckVaultResponse {
  bool connected = 1 [json_name = "connected"];
  string vault_version = 2 [json_name = "vaultVersion"];
  bool sealed = 3 [json_name = "sealed"];
  string message = 4 [json_name = "message"];
}

message GetStatsRequest {
  optional uint32 tenant_id = 1 [json_name = "tenantId"];
}

// Policy type for share restrictions
enum SharePolicyType {
  SHARE_POLICY_TYPE_UNSPECIFIED = 0;
  SHARE_POLICY_TYPE_BLACKLIST = 1;
  SHARE_POLICY_TYPE_WHITELIST = 2;
}

// Policy method for share restrictions
enum SharePolicyMethod {
  SHARE_POLICY_METHOD_UNSPECIFIED = 0;
  SHARE_POLICY_METHOD_IP = 1;
  SHARE_POLICY_METHOD_MAC = 2;
  SHARE_POLICY_METHOD_REGION = 3;
  SHARE_POLICY_METHOD_TIME = 4;
  SHARE_POLICY_METHOD_DEVICE = 5;
  SHARE_POLICY_METHOD_NETWORK = 6;
}

// Policy input for creating a share
message SharePolicyInput {
  SharePolicyType type = 1 [json_name = "type"];
  SharePolicyMethod method = 2 [json_name = "method"];
  string value = 3 [json_name = "value"];
  string reason = 4 [json_name = "reason"];
}

// Request to create a share link for a secret
message CreateShareSecretRequest {
  string resource_id = 1 [json_name = "resourceId"];
  string recipient_email = 2 [json_name = "recipientEmail"];
  string message = 3 [json_name = "message"];
  repeated SharePolicyInput policies = 4 [json_name = "policies"];
}

message CreateShareSecretResponse {
  string share_id = 1 [json_name = "shareId"];
  string share_link = 2 [json_name = "shareLink"];
}

message GetStatsResponse {
  int64 total_secrets = 1 [json_name = "totalSecrets"];
  int64 active_secrets = 2 [json_name = "activeSecrets"];
  int64 archived_secrets = 3 [json_name = "archivedSecrets"];
  int64 total_folders = 4 [json_name = "totalFolders"];
  int64 total_versions = 5 [json_name = "totalVersions"];
  double avg_versions_per_secret = 6 [json_name = "avgVersionsPerSecret"];
}
